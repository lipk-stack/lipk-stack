name: Deploy free tools to GitHub Pages

# Publishes the static site in ./projects to GitHub Pages for free.
# The "Setup Pages" step below uses `enablement: true`, which asks GitHub to
# provision Pages (Source: "GitHub Actions") automatically — so in most cases no
# manual Settings toggle is needed. The live URL will be:
#   https://lipk-stack.github.io/lipk-stack/
# NOTE: A free GitHub plan only serves Pages from a PUBLIC repo. If this repo is
# private, make it public (Settings → General → Danger Zone) or the site 404s.

on:
  push:
    branches: [main, claude/festive-ramanujan-guwaz5, claude/festive-ramanujan-7z4bqu]
    paths: ["projects/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-provision the Pages site if it isn't enabled yet, so the
          # deploy no longer hard-fails on a missing Settings → Pages toggle.
          enablement: true

      - name: Upload site artifact (./projects)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./projects

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
