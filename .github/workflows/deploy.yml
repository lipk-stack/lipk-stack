name: Deploy MAP Gem to GitHub Pages

# Free, zero-cost hosting. Once you enable Pages for this repo
# (Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"),
# every push to main rebuilds and publishes the app automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        # Serve under the project subpath, e.g. https://<user>.github.io/<repo>/
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: SPA fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
